appId: com.reprompt.app
productName: RePrompt
copyright: Copyright © 2026 RePrompt

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - resources/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icons/icon.ico
  sign: null
  signDlls: false
  forceCodeSigning: false
  publish:
    - provider: generic
      url: https://reprompt-one.vercel.app/download

nsis:
  oneClick: true
  perMachine: false
  allowElevation: true
  deleteAppDataOnUninstall: true
  include: resources/installer.nsh
  runAfterFinish: true
  allowToChangeInstallationDirectory: false
  artifactName: RePrompt-Setup-${version}.exe

portable:
  artifactName: RePrompt-${version}.exe

asar: true
