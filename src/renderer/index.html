<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:">
  <title>RePrompt | Default UI</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="app-container">
    <!-- Neo-Brutalist Navigation Sidebar -->
    <nav class="nav-sidebar">
      <div class="nav-destinations">
        <button class="sidebar-item active" data-page="home" title="Settings">
          <div class="nav-indicator">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          <span class="nav-label">Config</span>
        </button>

        <button class="sidebar-item" data-page="agents" title="Agents">
          <div class="nav-indicator">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 8V4H8"></path>
              <rect width="16" height="12" x="4" y="8" rx="2"></rect>
              <path d="M2 14h2"></path>
              <path d="M20 14h2"></path>
              <path d="M15 13v2"></path>
              <path d="M9 13v2"></path>
            </svg>
          </div>
          <span class="nav-label">Agents</span>
        </button>
      </div>
      <div class="nav-spacer"></div>
      <div class="version-tag">
        BYOK
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Home Page (Config) -->
      <div class="page active" id="page-home">
        <h1 class="sys-headline">RePrompt OS</h1>
        <p class="sys-subhead">LOCAL ANTHROPIC TERMINAL</p>

        <!-- API Key Card -->
        <div class="brutal-card">
          <div class="brutal-card-header">
            <div>
              <h2 class="sys-title">API Configuration</h2>
              <p style="margin-top:4px;">Define your local Anthropic key below.</p>
            </div>
            <span class="brutal-chip error" id="api-status">Not configured</span>
          </div>
          <div style="margin-top: 16px;">
            <div class="brutal-textfield" style="flex-direction: row; gap: 8px; margin-bottom: 16px;">
              <input type="password" id="api-key-input" style="flex: 1; margin-bottom: 0;"
                placeholder="sk-ant-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off">
              <button class="brutal-btn" id="toggle-visibility"
                style="border-radius: 12px; padding: 0 16px;">👁</button>
            </div>
            <div style="display: flex; gap: 16px;">
              <button class="brutal-btn brutal-btn-primary" id="save-api-key">Save Key</button>
              <button class="brutal-btn" id="delete-api-key">Delete</button>
              <button class="brutal-btn" id="get-api-key-link" style="margin-left:auto;">Get API Key →</button>
            </div>
            <div id="api-message" style="margin-top: 12px; font-weight: bold;"></div>
          </div>
        </div>

        <!-- Shortcuts Card -->
        <div class="brutal-card">
          <div class="brutal-card-header">
            <div>
              <h2 class="sys-title">Global Shortcuts</h2>
              <p style="margin-top:4px;">Master toggle for background execution.</p>
            </div>
            <span class="brutal-chip success" id="shortcut-status">Enabled</span>
          </div>
          <div style="margin-top: 16px;">
            <button class="brutal-btn brutal-btn-primary" id="toggle-shortcut">Toggle Shortcuts</button>
          </div>
        </div>
      </div>

      <!-- Agents Page -->
      <div class="page" id="page-agents" style="display: none;">
        <h1 class="sys-headline">Agents</h1>
        <p class="sys-subhead">MANAGE PROMPT OPTIMIZERS</p>

        <div class="brutal-card">
          <div class="brutal-card-header"
            style="margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 16px;">
            <h2 class="sys-title">Available Agents</h2>
            <span class="brutal-chip success" id="agents-status">6 Active</span>
          </div>

          <!-- Agents List -->
          <div id="agents-list">
            <!-- Rendered by settings.ts -->
          </div>

          <div style="display: flex; justify-content: space-between; margin-top: 32px; padding-top: 24px;">
            <button class="brutal-btn brutal-btn-primary" id="add-custom-agent">+ Add Custom Agent</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Custom Agent Modal -->
  <div class="modal-overlay" id="agent-modal">
    <div class="brutal-modal">
      <div class="modal-header">
        <h2 class="sys-title" id="modal-title">Add Custom Agent</h2>
        <button class="icon-btn" id="modal-close" title="Close">X</button>
      </div>

      <div class="brutal-textfield">
        <label for="agent-name">Agent Name</label>
        <input type="text" id="agent-name" placeholder="My Agent">
      </div>

      <div style="display: flex; gap: 16px; margin-bottom: 24px;">
        <div class="brutal-textfield" style="width: 100px; margin-bottom: 0;">
          <label for="agent-icon">Icon (emoji)</label>
          <input type="text" id="agent-icon" maxlength="2" placeholder="🤖">
        </div>
        <div class="brutal-textfield" style="flex-grow: 1; margin-bottom: 0;">
          <label for="agent-shortcut-key">Shortcut Key (Ctrl+Shift+?)</label>
          <input type="text" id="agent-shortcut-key" maxlength="1" placeholder="X" style="text-transform: uppercase;">
          <span class="input-hint" id="shortcut-hint"></span>
        </div>
      </div>

      <div class="brutal-textfield">
        <label for="agent-prompt">System Prompt</label>
        <textarea id="agent-prompt" rows="6" placeholder="You are a helpful assistant..."></textarea>
      </div>

      <div class="modal-footer">
        <button class="brutal-btn" id="modal-cancel">Cancel</button>
        <button class="brutal-btn brutal-btn-primary" id="modal-save">Save Agent</button>
      </div>
    </div>
  </div>

  <script src="settings.js"></script>
</body>

</html>
